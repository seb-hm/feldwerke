<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agri-Tracker-PV Visualizer</title>
<style>
  :root {
    --green: #1d5c3f;
    --green-light: #7fe0b0;
    --bg: #f4f6f4;
    --card: #ffffff;
    --text: #1a2b22;
    --muted: #5f7268;
    --border: #dde5df;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--green);
    color: #fff;
    padding: 10px 24px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  .layout {
    display: grid;
    grid-template-columns: 290px 1fr;
    gap: 14px;
    padding: 12px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    align-self: start;
    max-height: calc(100vh - 78px);
    overflow-y: auto;
    position: sticky;
    top: 12px;
  }
  .panel h2 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 5px;
    margin-top: 9px;
  }
  .panel h2:first-child { margin-top: 0; }
  .row { margin-bottom: 5px; }
  label { display: block; font-size: 0.78rem; margin-bottom: 2px; color: var(--text); }
  label .val { float: right; color: var(--muted); font-variant-numeric: tabular-nums; }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 22px;
    background: transparent;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 6px;
    border-radius: 3px;
    background: #d3e0d7;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
    margin-top: -7px;
    cursor: pointer;
  }
  input[type=range]::-moz-range-track {
    height: 6px;
    border-radius: 3px;
    background: #d3e0d7;
  }
  input[type=range]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--green);
    border: 2px solid #fff;
    cursor: pointer;
  }
  input[type=range]:disabled { opacity: 0.45; cursor: default; }
  input[type=range]:disabled::-webkit-slider-thumb { cursor: default; }
  input[type=number] {
    width: 100%;
    padding: 6px 4px 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.88rem;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    opacity: 1;
    transform: scale(1.6);
    transform-origin: right center;
    margin-left: 10px;
    cursor: pointer;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button {
    width: 100%;
    padding: 6px 10px;
    border: none;
    border-radius: 7px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 6px;
  }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: #17492f; }
  .btn-secondary { background: #e7eee9; color: var(--green); }
  .btn-secondary:hover { background: #d8e4dc; }
  .checkbox-row { display: flex; align-items: center; gap: 7px; font-size: 0.78rem; margin-bottom: 5px; }
  .checkbox-row input { accent-color: var(--green); }
  .note {
    font-size: 0.7rem;
    color: var(--muted);
    background: #fbf6e8;
    border: 1px solid #eee3c2;
    border-radius: 7px;
    padding: 6px 8px;
    margin-bottom: 7px;
  }
  .kpi-box {
    background: #eef6f0;
    border: 1px solid #cfe5d6;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.78rem;
  }
  .kpi-box div { display: flex; justify-content: space-between; padding: 2px 0; }
  .kpi-box b { font-variant-numeric: tabular-nums; }
  .kpi-note { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }
  .canvas-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 36px;
  }
  .hint {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .hint b { color: var(--green); }
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  #dropzone.drag { border-color: var(--green); background: #eef6f0; }
  #dropzone p { margin-bottom: 6px; }
  #dropzone .big { font-size: 1.05rem; color: var(--text); font-weight: 600; }
  canvas {
    display: block;
    max-width: 92%;
    width: auto;
    height: auto;
    max-height: calc(100vh - 190px);
    margin: 0 auto;
    border-radius: 6px;
    cursor: crosshair;
  }
  footer {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    padding: 8px;
  }
</style>
</head>
<body>
<header>
  <h1>Agri-Tracker-PV Visualizer</h1>
</header>

<div class="layout">
  <div class="panel">
    <h2>1 &middot; Bild</h2>
    <button class="btn-primary" id="btnUpload">Luftbild laden</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none">

    <h2>2 &middot; Feld markieren</h2>
    <div class="checkbox-row">
      <input type="checkbox" id="grid" checked>
      <label for="grid" style="margin:0">Perspektiven-Gitter anzeigen (25&nbsp;m)</label>
    </div>
    <div style="display:grid;grid-template-columns:1fr 46px;gap:6px">
      <button class="btn-secondary" id="btnResetCorners">Eckpunkte zur&uuml;cksetzen</button>
      <button class="btn-secondary" id="btnUndo" title="Letzten Schritt r&uuml;ckg&auml;ngig machen" style="font-size:1.15rem;line-height:1;padding:4px 0">&#8617;</button>
    </div>

    <h2>3 &middot; Anlage konfigurieren</h2>
    <div class="row">
      <label>Reihenabstand <span class="val" id="vSpacing">10 m</span></label>
      <input type="range" id="spacing" min="6" max="16" step="0.5" value="10">
    </div>
    <div class="row">
      <label>Modulbreite (Tracker-Tisch) <span class="val" id="vWidth">2.4 m</span></label>
      <input type="range" id="modWidth" min="1.5" max="4" step="0.1" value="2.4">
    </div>
    <div class="row">
      <label>Ausrichtung der Reihen <span class="val" id="vTheta">0&deg;</span></label>
      <input type="range" id="theta" min="-90" max="90" step="1" value="0">
    </div>
    <div class="row">
      <label>Tageszeit (Tracker-Nachf&uuml;hrung) <span class="val" id="vTime">12:00</span></label>
      <input type="range" id="time" min="6" max="20" step="0.25" value="12">
    </div>
    <div class="row">
      <label>Kameraperspektive <span class="val" id="vPersp">auto</span></label>
      <input type="range" id="persp" min="0" max="100" step="1" value="0" disabled>
      <div class="checkbox-row" style="margin-top:5px">
        <input type="checkbox" id="autoPersp" checked>
        <label for="autoPersp" style="margin:0">automatisch aus Feldmarkierung sch&auml;tzen</label>
      </div>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="shadows" checked>
      <label for="shadows" style="margin:0">Schattenwurf anzeigen</label>
    </div>

    <h2>4 &middot; Fl&auml;chenma&szlig;e</h2>
    <div class="grid2 row">
      <div>
        <label>Breite (m)</label>
        <input type="number" id="fieldW" value="300" min="20" step="10">
      </div>
      <div>
        <label>Tiefe (m)</label>
        <input type="number" id="fieldH" value="200" min="20" step="10">
      </div>
    </div>

    <h2>5 &middot; Export</h2>
    <button class="btn-primary" id="btnExport">Als PNG exportieren</button>
  </div>

  <div class="canvas-wrap">
    <p class="hint" id="hintText"><b>Schritt 1:</b> Luftbild hochladen oder Demo-Feld laden.</p>
    <div id="dropzone">
      <p class="big">Luftbild hierher ziehen</p>
      <p>oder klicken zum Ausw&auml;hlen</p>
    </div>
    <canvas id="canvas" style="display:none"></canvas>
  </div>
</div>


<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const dropzone = document.getElementById('dropzone');
  const hintText = document.getElementById('hintText');

  let img = null;
  let corners = [];          // 4 points in image-natural coordinates: TL, TR, BR, BL
  let cornerHistory = [];    // undo stack for corner positions
  let dragIdx = -1;
  const HANDLE_R = 14;
  const AXIS_HEIGHT = 2.4;   // m, tracker rotation axis above ground

  // ---------- image loading ----------
  function loadImage(src) {
    const im = new Image();
    im.onload = () => {
      img = im;
      canvas.width = im.naturalWidth;
      canvas.height = im.naturalHeight;
      canvas.style.display = 'block';
      dropzone.style.display = 'none';
      cornerHistory = [];
      resetCorners();
      draw();
      setHint('<b>Schritt 2:</b> Die 4 Eckpunkte auf ein Boden-Rechteck ziehen (Gitter pr&uuml;fen), dann Anlage konfigurieren.');
    };
    im.src = src;
  }

  function setHint(html) { hintText.innerHTML = html; }

  document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
  dropzone.onclick = () => document.getElementById('fileInput').click();
  document.getElementById('fileInput').onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => loadImage(ev.target.result);
    r.readAsDataURL(f);
  };
  ['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => {
    e.preventDefault(); dropzone.classList.add('drag');
  }));
  ['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => {
    e.preventDefault(); dropzone.classList.remove('drag');
  }));
  dropzone.addEventListener('drop', e => {
    const f = e.dataTransfer.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = ev => loadImage(ev.target.result);
    r.readAsDataURL(f);
  });

  // ---------- corners ----------
  function resetCorners() {
    const w = canvas.width, h = canvas.height;
    corners = [
      { x: w * 0.30, y: h * 0.22 },
      { x: w * 0.78, y: h * 0.28 },
      { x: w * 0.88, y: h * 0.80 },
      { x: w * 0.14, y: h * 0.72 }
    ];
  }
  function pushHistory() {
    cornerHistory.push(corners.map(c => ({ x: c.x, y: c.y })));
    if (cornerHistory.length > 100) cornerHistory.shift();
  }
  document.getElementById('btnResetCorners').onclick = () => {
    if (img) { pushHistory(); resetCorners(); draw(); }
  };
  document.getElementById('btnUndo').onclick = () => {
    if (img && cornerHistory.length) { corners = cornerHistory.pop(); draw(); }
  };

  function canvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) * (canvas.width / r.width),
      y: (e.clientY - r.top) * (canvas.height / r.height)
    };
  }
  canvas.addEventListener('pointerdown', e => {
    if (!img) return;
    const p = canvasPos(e);
    const scale = canvas.width / canvas.getBoundingClientRect().width;
    const rr = HANDLE_R * scale * 1.6;
    dragIdx = corners.findIndex(c => Math.hypot(c.x - p.x, c.y - p.y) < rr);
    if (dragIdx >= 0) { pushHistory(); canvas.setPointerCapture(e.pointerId); }
  });
  canvas.addEventListener('pointermove', e => {
    if (dragIdx < 0) return;
    const p = canvasPos(e);
    corners[dragIdx].x = Math.max(0, Math.min(canvas.width, p.x));
    corners[dragIdx].y = Math.max(0, Math.min(canvas.height, p.y));
    draw();
  });
  canvas.addEventListener('pointerup', () => { dragIdx = -1; });

  // ---------- homography: unit square -> quad ----------
  function computeHomography(dst) {
    const src = [[0,0],[1,0],[1,1],[0,1]];
    const d = dst.map(p => [p.x, p.y]);
    const A = [], b = [];
    for (let i = 0; i < 4; i++) {
      const [u, v] = src[i], [x, y] = d[i];
      A.push([u, v, 1, 0, 0, 0, -u * x, -v * x]); b.push(x);
      A.push([0, 0, 0, u, v, 1, -u * y, -v * y]); b.push(y);
    }
    for (let c = 0; c < 8; c++) {
      let piv = c;
      for (let r2 = c + 1; r2 < 8; r2++) if (Math.abs(A[r2][c]) > Math.abs(A[piv][c])) piv = r2;
      [A[c], A[piv]] = [A[piv], A[c]]; [b[c], b[piv]] = [b[piv], b[c]];
      const pv = A[c][c];
      if (Math.abs(pv) < 1e-12) return null;
      for (let r2 = 0; r2 < 8; r2++) {
        if (r2 === c) continue;
        const f = A[r2][c] / pv;
        for (let k = c; k < 8; k++) A[r2][k] -= f * A[c][k];
        b[r2] -= f * b[c];
      }
    }
    return b.map((v, i) => v / A[i][i]);
  }
  function project(h, u, v) {
    const w = h[6] * u + h[7] * v + 1;
    return { x: (h[0] * u + h[1] * v + h[2]) / w, y: (h[3] * u + h[4] * v + h[5]) / w };
  }

  // pixels per meter (vertical world scale approximation) at unit-space point
  function ppmAt(h, u, v, Hm) {
    const eps = 0.01;
    const p1 = project(h, u, v);
    const p2 = project(h, u, v - eps);
    return Math.hypot(p2.x - p1.x, p2.y - p1.y) / (eps * Hm);
  }

  // estimate obliqueness of the marked quad: 0 = nadir, 1 = strongly oblique
  function estimatePerspFactor() {
    const topLen = Math.hypot(corners[1].x - corners[0].x, corners[1].y - corners[0].y);
    const botLen = Math.hypot(corners[2].x - corners[3].x, corners[2].y - corners[3].y);
    if (botLen < 1) return 0;
    const ratio = topLen / botLen;
    return Math.max(0, Math.min(1, Math.abs(1 - ratio) * 1.8));
  }

  // ---------- params ----------
  const $ = id => document.getElementById(id);
  const params = () => ({
    spacing: parseFloat($('spacing').value),
    modWidth: parseFloat($('modWidth').value),
    theta: parseFloat($('theta').value) * Math.PI / 180,
    time: parseFloat($('time').value),
    shadows: $('shadows').checked,
    grid: $('grid').checked,
    autoPersp: $('autoPersp').checked,
    perspManual: parseFloat($('persp').value) / 100,
    W: Math.max(20, parseFloat($('fieldW').value) || 300),
    H: Math.max(20, parseFloat($('fieldH').value) || 200)
  });

  ['spacing','modWidth','theta','time','persp'].forEach(id => $(id).addEventListener('input', () => { updateLabels(); draw(); }));
  ['shadows','grid'].forEach(id => $(id).addEventListener('change', () => draw()));
  $('autoPersp').addEventListener('change', () => {
    $('persp').disabled = $('autoPersp').checked;
    updateLabels(); draw();
  });
  ['fieldW','fieldH'].forEach(id => $(id).addEventListener('input', () => draw()));

  function updateLabels() {
    $('vSpacing').textContent = $('spacing').value + ' m';
    $('vWidth').textContent = parseFloat($('modWidth').value).toFixed(1) + ' m';
    $('vTheta').textContent = $('theta').value + '°';
    const t = parseFloat($('time').value);
    const hh = Math.floor(t), mm = Math.round((t - hh) * 60);
    $('vTime').textContent = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
    $('vPersp').textContent = $('autoPersp').checked ? 'auto' : $('persp').value + ' %';
  }

  // ---------- drawing helpers ----------
  // poly: array of [u, v, heightMeters]; subdivides edges, lifts points by height * ppm * factor
  function pathPoly3D(c, h, poly, subdiv, Hm, factor) {
    c.beginPath();
    for (let i = 0; i < poly.length; i++) {
      const a = poly[i], b2 = poly[(i + 1) % poly.length];
      for (let s = 0; s <= subdiv; s++) {
        const t = s / subdiv;
        const u = a[0] + (b2[0] - a[0]) * t;
        const v = a[1] + (b2[1] - a[1]) * t;
        const hgt = a[2] + (b2[2] - a[2]) * t;
        const p = project(h, u, v);
        const lift = hgt > 0 && factor > 0 ? hgt * ppmAt(h, u, v, Hm) * factor : 0;
        const y = p.y - lift;
        if (i === 0 && s === 0) c.moveTo(p.x, y); else c.lineTo(p.x, y);
      }
    }
    c.closePath();
  }

  function draw(exportMode) {
    if (!img) return;
    const c = ctx;
    c.clearRect(0, 0, canvas.width, canvas.height);
    c.drawImage(img, 0, 0, canvas.width, canvas.height);

    const p = params();
    const h = computeHomography(corners);
    if (h) {
      const factor = p.autoPersp ? estimatePerspFactor() : p.perspManual;
      const W = p.W, H = p.H;
      // 0° = rows run along the Tiefe axis (bottom to top in field space)
      const dirX = -Math.sin(p.theta), dirY = Math.cos(p.theta);
      const nX = -dirY, nY = dirX;
      const diag = Math.hypot(W, H);
      const nRows = Math.ceil(diag / p.spacing) + 1;

      const dt = Math.abs(p.time - 13) / 7;
      const tilt = (10 + 55 * dt) * Math.PI / 180;
      const visW = p.modWidth * Math.cos(tilt) + 0.15;
      const edgeLift = (p.modWidth / 2) * Math.sin(tilt);
      const shadowSign = p.time < 13 ? -1 : 1;
      const shadowLen = 0.8 + 7 * Math.pow(dt, 1.6);

      const segLen = 22, gap = 1.5;
      const toUnit = (x, y) => [(x + W / 2) / W, (y + H / 2) / H];
      const inField = (u, v) => u > -0.02 && u < 1.02 && v > -0.02 && v < 1.02;

      // expanded clip: quad with top edge lifted so standing panels are not cut off
      const liftTop = factor > 0.03
        ? (AXIS_HEIGHT + edgeLift + 0.5) * Math.max(ppmAt(h, 0, 0, H), ppmAt(h, 1, 0, H)) * factor
        : 0;
      c.save();
      c.beginPath();
      c.moveTo(corners[0].x, corners[0].y - liftTop);
      c.lineTo(corners[1].x, corners[1].y - liftTop);
      c.lineTo(corners[2].x, corners[2].y);
      c.lineTo(corners[3].x, corners[3].y);
      c.closePath();
      c.clip();

      // collect rows, sorted far -> near (image y ascending) for correct overlap
      const rows = [];
      for (let k = -nRows; k <= nRows; k++) {
        const off = k * p.spacing;
        const cu = toUnit(off * nX, off * nY);
        if (cu[0] < -0.6 || cu[0] > 1.6 || cu[1] < -0.6 || cu[1] > 1.6) continue;
        rows.push({ off, cy: project(h, cu[0], cu[1]).y });
      }
      rows.sort((a, b) => a.cy - b.cy);

      // segment polygon builder: center offset cx (m across rows), width wM, heights [hA, hB] on the two long edges
      const segPoly = (s, cx, wM, hA, hB) => {
        const x0 = s * dirX + cx * nX, y0 = s * dirY + cx * nY;
        const x1 = (s + segLen) * dirX + cx * nX, y1 = (s + segLen) * dirY + cx * nY;
        const wx = (wM / 2) * nX, wy = (wM / 2) * nY;
        return [
          [...toUnit(x0 - wx, y0 - wy), hA],
          [...toUnit(x1 - wx, y1 - wy), hA],
          [...toUnit(x1 + wx, y1 + wy), hB],
          [...toUnit(x0 + wx, y0 + wy), hB]
        ];
      };
      const segCenterInField = (s, cx) => {
        const mx = (s + segLen / 2) * dirX + cx * nX, my = (s + segLen / 2) * dirY + cx * nY;
        const [u, v] = toUnit(mx, my);
        return inField(u, v);
      };

      // 1) ground shadows for all rows first
      if (p.shadows) {
        c.fillStyle = 'rgba(20,30,20,0.35)';
        const shOff = shadowSign * (visW / 2 + shadowLen / 2 + factor * AXIS_HEIGHT * 0.8);
        for (const row of rows) {
          for (let s = -diag; s < diag; s += segLen + gap) {
            if (!segCenterInField(s, row.off)) continue;
            pathPoly3D(c, h, segPoly(s, row.off + shOff, shadowLen + factor * AXIS_HEIGHT, 0, 0), 4, H, 0);
            c.fill();
          }
        }
      }

      // 2) rows far -> near: posts, then panel face
      const hHigh = AXIS_HEIGHT + edgeLift;
      const hLow = Math.max(0.4, AXIS_HEIGHT - edgeLift);
      // high edge faces away from the sun side
      const heights = shadowSign > 0 ? [hHigh, hLow] : [hLow, hHigh];

      for (const row of rows) {
        for (let s = -diag; s < diag; s += segLen + gap) {
          if (!segCenterInField(s, row.off)) continue;

          // posts (only when oblique enough)
          if (factor > 0.06) {
            c.strokeStyle = 'rgba(45,48,52,0.75)';
            for (const t of [0.12, 0.88]) {
              const px = (s + segLen * t) * dirX + row.off * nX;
              const py = (s + segLen * t) * dirY + row.off * nY;
              const [u, v] = toUnit(px, py);
              const g0 = project(h, u, v);
              const ppm = ppmAt(h, u, v, H);
              c.lineWidth = Math.max(1, 0.09 * ppm);
              c.beginPath();
              c.moveTo(g0.x, g0.y);
              c.lineTo(g0.x, g0.y - AXIS_HEIGHT * ppm * factor);
              c.stroke();
            }
          }

          // panel face
          pathPoly3D(c, h, segPoly(s, row.off, visW, heights[0], heights[1]), 4, H, factor);
          c.fillStyle = 'rgba(18,28,52,0.92)';
          c.fill();
          // sheen
          pathPoly3D(c, h, segPoly(s, row.off, visW * 0.55, (heights[0] + heights[1]) / 2 + 0.05, (heights[0] + heights[1]) / 2 + 0.05), 4, H, factor);
          c.fillStyle = 'rgba(90,130,200,0.25)';
          c.fill();
        }
      }
      c.restore();

      // 3) perspective grid (drawn without top-lift clip, strictly on ground quad)
      if (p.grid && !exportMode) {
        c.save();
        c.beginPath();
        corners.forEach((pt, i) => i === 0 ? c.moveTo(pt.x, pt.y) : c.lineTo(pt.x, pt.y));
        c.closePath();
        c.clip();
        c.strokeStyle = 'rgba(255,255,255,0.55)';
        c.lineWidth = Math.max(1, canvas.width / 1400);
        const step = 25;
        for (let x = 0; x <= W; x += step) {
          c.beginPath();
          for (let i = 0; i <= 24; i++) {
            const pt = project(h, x / W, i / 24);
            i === 0 ? c.moveTo(pt.x, pt.y) : c.lineTo(pt.x, pt.y);
          }
          c.stroke();
        }
        for (let y = 0; y <= H; y += step) {
          c.beginPath();
          for (let i = 0; i <= 24; i++) {
            const pt = project(h, i / 24, y / H);
            i === 0 ? c.moveTo(pt.x, pt.y) : c.lineTo(pt.x, pt.y);
          }
          c.stroke();
        }
        c.restore();

        // axis labels: Breite along top edge, Tiefe along left edge
        const drawAxisLabel = (text, pA, pB) => {
          let ang = Math.atan2(pB.y - pA.y, pB.x - pA.x);
          if (ang > Math.PI / 2 || ang < -Math.PI / 2) ang += Math.PI; // keep upright
          const mid = { x: (pA.x + pB.x) / 2, y: (pA.y + pB.y) / 2 };
          const fs = Math.max(14, canvas.width / 70);
          c.save();
          c.translate(mid.x, mid.y);
          c.rotate(ang);
          c.font = '600 ' + fs + 'px "Segoe UI", sans-serif';
          c.textAlign = 'center';
          c.textBaseline = 'bottom';
          c.lineWidth = fs / 4.5;
          c.strokeStyle = 'rgba(20,40,28,0.85)';
          c.strokeText(text, 0, -fs * 0.35);
          c.fillStyle = '#ffffff';
          c.fillText(text, 0, -fs * 0.35);
          c.restore();
        };
        drawAxisLabel('Breite ' + Math.round(W) + ' m', project(h, 0.15, 0.96), project(h, 0.85, 0.96));
        drawAxisLabel('Tiefe ' + Math.round(H) + ' m', project(h, 0.04, 0.15), project(h, 0.04, 0.85));
      }
    }

    // handles (not in export)
    if (!exportMode) {
      corners.forEach((pt, i) => {
        c.beginPath();
        c.arc(pt.x, pt.y, HANDLE_R, 0, Math.PI * 2);
        c.fillStyle = 'rgba(255,255,255,0.85)';
        c.fill();
        c.lineWidth = 3;
        c.strokeStyle = '#1d5c3f';
        c.stroke();
      });
      c.setLineDash([10, 8]);
      c.lineWidth = 2.5;
      c.strokeStyle = 'rgba(255,255,255,0.9)';
      c.beginPath();
      corners.forEach((pt, i) => i === 0 ? c.moveTo(pt.x, pt.y) : c.lineTo(pt.x, pt.y));
      c.closePath();
      c.stroke();
      c.setLineDash([]);
    }
  }

  // ---------- export ----------
  document.getElementById('btnExport').onclick = () => {
    if (!img) return;
    draw(true);
    const a = document.createElement('a');
    a.download = 'agri-pv-visualisierung.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    draw(false);
  };

  updateLabels();
})();
</script>
</body>
</html>
